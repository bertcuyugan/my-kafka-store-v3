{% extends "base.html" %}
{% block title %}Register — Kafka Store{% endblock %}

{% block content %}
<div class="form-container">
    <h1>Create an Account</h1>
    <form method="POST" action="{{ url_for('register') }}">
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" required placeholder="Alice Johnson">
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required placeholder="alice@example.com">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required minlength="6" placeholder="At least 6 characters">
        </div>
        <button type="submit" class="btn btn-primary">Register</button>
        <p class="form-footer">Already have an account? <a href="{{ url_for('login') }}">Log in</a></p>
    </form>
</div>
{% endblock %}
